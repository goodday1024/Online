name: Online
options:
  bundleIdPrefix: com.earthonline
  deploymentTarget:
    iOS: "17.0"
targets:
  Online:
    type: application
    platform: iOS
    sources:
      - path: Online
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.earthonline.Online
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: "拍摄照片,生成你的日记与成就"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "录制声音,与端侧 AI 语音交流"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "将你的语音转为文字,与端侧 AI 交流"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "选择照片进行归档"
    info:
      path: Online/Info.plist
      properties:
        CFBundleDisplayName: Online
        CFBundleName: Online
